packages:
  - packages/*
  - apps/*
  - examples/*

blockExoticSubdeps: true

catalog:
  '@tailwindcss/postcss': 4.2.1
  '@tailwindcss/vite': 4.2.1
  '@types/react': 19.2.14
  '@types/react-dom': 19.2.3
  '@vitejs/plugin-react': 6.0.1
  postcss: 8.5.8
  react: 19.2.4
  react-dom: 19.2.4
  tailwindcss: 4.2.1
  vite: 8.0.1
  vitest: 4.1.0
  vite-plus: 0.1.13

ignoredBuiltDependencies:
  - edgedriver
  - geckodriver
  - sharp

minimumReleaseAge: 10080

minimumReleaseAgeExclude:
  - vite
  - vite-plus
  - rolldown
  - '@rolldown/*'
  - '@oxc-project/*'
  - '@voidzero-dev/*'
  - '@storybook/*'
  - storybook
  - oxlint
  - '@oxlint/*'
  - oxlint-tsgolint
  - '@oxlint-tsgolint/*'
  - oxfmt
  - '@oxfmt/*'

onlyBuiltDependencies:
  - '@tailwindcss/oxide'
  - agent-browser

verifyDepsBeforeRun: install
